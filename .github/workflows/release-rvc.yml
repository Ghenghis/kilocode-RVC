name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-cli:
    name: Build CLI
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux
            host: ubuntu-latest
          - name: windows
            host: windows-latest
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build CLI
        run: bun run --cwd packages/opencode build
        env:
          KILO_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.settings.name }}
          path: packages/opencode/dist

  build-vsix:
    name: Build VSIX
    needs: build-cli
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux
            cli: cli-linux
          - name: windows
            cli: cli-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install vsce
        run: bun install -g @vscode/vsce

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.settings.cli }}
          path: packages/opencode/dist

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build VSIX
        run: bun script/build.ts
        working-directory: packages/kilo-vscode
        env:
          CLI_DIST_DIR: ../../packages/opencode/dist
          KILO_VERSION: ${{ steps.version.outputs.version }}
          GH_REPO: ${{ github.repository }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.settings.name }}
          path: packages/kilo-vscode/out/*.vsix

  build-rvc-docker:
    name: Build RVC Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: repo
        run: echo "owner_lc=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push RVC TTS image
        uses: docker/build-push-action@v5
        with:
          context: docker/rvc
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner_lc }}/kilocode-rvc-tts:${{ steps.version.outputs.tag }}
            ghcr.io/${{ steps.repo.outputs.owner_lc }}/kilocode-rvc-tts:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-desktop:
    name: Build Desktop (${{ matrix.settings.name }})
    needs: build-cli
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: windows
            host: windows-latest
            target: x86_64-pc-windows-msvc
            cli: cli-windows
          - name: linux-x64
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cli: cli-linux
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.settings.target }}

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.settings.cli }}
          path: packages/opencode/dist

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare desktop build
        run: |
          cd packages/desktop
          bun ./scripts/prepare.ts
        env:
          KILO_VERSION: ${{ steps.version.outputs.version }}
          RUST_TARGET: ${{ matrix.settings.target }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build Tauri desktop app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/desktop
          args: --target ${{ matrix.settings.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.settings.name }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.settings.target }}/release/bundle/**/*.msi
            packages/desktop/src-tauri/target/${{ matrix.settings.target }}/release/bundle/**/*.exe
            packages/desktop/src-tauri/target/${{ matrix.settings.target }}/release/bundle/**/*.deb
            packages/desktop/src-tauri/target/${{ matrix.settings.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs:
      - build-vsix
      - build-rvc-docker
      - build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.version
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: KiloCode RVC v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/vsix-*/*.vsix
            artifacts/desktop-windows/**/*.msi
            artifacts/desktop-windows/**/*.exe
            artifacts/desktop-linux-x64/**/*.deb
            artifacts/desktop-linux-x64/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
