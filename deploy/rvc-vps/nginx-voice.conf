# Nginx site config for voice.daveai.tech
# Place in /etc/nginx/sites-available/voice.daveai.tech
# Symlink to /etc/nginx/sites-enabled/

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=synth_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream edge_tts_backend {
    server 127.0.0.1:5050;
}

upstream model_backend {
    server 127.0.0.1:8080;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name voice.daveai.tech;

    # Allow Cloudflare to handle SSL termination, so we serve on 80 as well.
    # If you want forced HTTPS redirect, uncomment below:
    # return 301 https://$host$request_uri;

    # Include the same location blocks for Cloudflare flexible SSL setups
    include /etc/nginx/snippets/voice-locations.conf;
}

server {
    listen 443 ssl;
    server_name voice.daveai.tech;

    # Cloudflare Origin Certificate (generate from Cloudflare dashboard)
    ssl_certificate     /etc/ssl/cloudflare/voice.daveai.tech.pem;
    ssl_certificate_key /etc/ssl/cloudflare/voice.daveai.tech.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    include /etc/nginx/snippets/voice-locations.conf;
}
