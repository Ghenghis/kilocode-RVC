# voice.daveai.tech - KiloCode Voice Server
# Cloudflare handles SSL termination (Flexible mode)

limit_req_zone $binary_remote_addr zone=synth_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream edge_tts_backend {
    server 127.0.0.1:5050;
}

upstream model_backend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name voice.daveai.tech;

    # CORS headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;

    # Handle preflight
    location @cors_preflight {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    # Synthesize gets tighter rate limit
    location = /api/synthesize {
        limit_req zone=synth_limit burst=5 nodelay;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://edge_tts_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # API endpoints -> edge-tts-server
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://edge_tts_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Model downloads -> model-server
    location /models/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://model_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Root health check
    location / {
        proxy_pass http://edge_tts_backend;
        proxy_set_header Host $host;
    }
}
