# Shared location blocks for voice.daveai.tech
# Place in /etc/nginx/snippets/voice-locations.conf

client_max_body_size 10M;

# CORS headers applied globally
add_header Access-Control-Allow-Origin "*" always;
add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

# Handle CORS preflight globally
location @cors_preflight {
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type, Authorization";
    add_header Content-Length 0;
    add_header Content-Type text/plain;
    return 204;
}

# Health check -- no rate limit
location = /api/health {
    proxy_pass http://edge_tts_backend/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Synthesize endpoint -- tighter rate limit
location = /api/synthesize {
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        return 204;
    }

    limit_req zone=synth_limit burst=5 nodelay;

    proxy_pass http://edge_tts_backend/synthesize;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Synthesize can take time for long text
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}

# Voices list
location = /api/voices {
    limit_req zone=api_limit burst=10 nodelay;

    proxy_pass http://edge_tts_backend/voices;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Cache voice list for 1 hour
    proxy_cache_valid 200 1h;
}

# API catch-all -- proxy to edge-tts server
location /api/ {
    limit_req zone=api_limit burst=10 nodelay;

    # Strip /api prefix when proxying
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://edge_tts_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Model files -- proxy to static nginx container
location /models/ {
    limit_req zone=api_limit burst=20 nodelay;

    proxy_pass http://model_backend/models/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Models are large, allow slower downloads
    proxy_read_timeout 300s;
    proxy_buffering off;
}

# Root -- basic info page
location = / {
    default_type application/json;
    return 200 '{"service":"KiloCode Voice Server","endpoints":["/api/health","/api/voices","/api/synthesize","/api/models","/models/"]}';
}
